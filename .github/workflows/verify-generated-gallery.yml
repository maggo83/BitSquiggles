name: Verify BitSquiggles generated outputs

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Compile Java reference implementation
        run: javac -d out java/module-info.java java/bitsquiggles/*.java
      - name: Run Java tests
        run: java -Xmx512m -cp out bitsquiggles.BitSquiggle32Test
      - name: Verify generated example gallery
        run: java -cp out bitsquiggles.GalleryGenerator --check
      - name: Verify generated conformance fixtures
        run: java -cp out bitsquiggles.ConformanceFixtureGenerator --check
      - name: Run browser parity tests
        run: node web/bitsquiggle32.test.mjs
      - name: Run MicroPython-compatible tests under CPython
        run: python3 micropython/test_bitsquiggle32.py
