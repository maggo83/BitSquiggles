name: Verify BitSquiggles generated outputs

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Compile headless Java core module
        run: |
          mkdir -p out/core out/renderer-swing out/test
          javac -d out/core java/core/module-info.java \
            java/bitsquiggles/BitSquiggle32.java \
            java/bitsquiggles/GalleryGenerator.java \
            java/bitsquiggles/ConformanceFixtureGenerator.java
      - name: Compile optional Java2D renderer module
        run: |
          javac -d out/renderer-swing --module-path out/core java/renderer-swing/module-info.java \
            java/renderer-swing/bitsquiggles/renderer/swing/BitSquiggle32RendererSwing.java
      - name: Compile Java test and demo sources
        run: |
          javac -d out/test -cp out/core:out/renderer-swing \
            java/bitsquiggles/BitSquiggle32Test.java \
            java/bitsquiggles/BitSquigglesDemo.java
      - name: Run Java tests
        run: java -Xmx512m -cp out/core:out/renderer-swing:out/test bitsquiggles.BitSquiggle32Test
      - name: Verify generated example gallery
        run: java --module-path out/core --module io.github.maggo83.bitsquiggles/bitsquiggles.GalleryGenerator --check
      - name: Verify generated conformance fixtures
        run: java --module-path out/core --module io.github.maggo83.bitsquiggles/bitsquiggles.ConformanceFixtureGenerator --check
      - name: Run JavaScript core and playground tests
        run: npm test --prefix web
      - name: Run MicroPython-compatible tests under CPython
        run: python3 micropython/test_bitsquiggle32.py
      - name: Build and run C99 conformance tests
        run: make -C c test
