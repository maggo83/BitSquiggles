name: Verify generated gallery

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Compile Java reference implementation
        run: javac -d out java/bit32vis/*.java
      - name: Run Java tests
        run: java -Xmx512m -cp out bit32vis.Bit32VisTest
      - name: Verify generated example gallery
        run: java -cp out bit32vis.GalleryGenerator --check
      - name: Run MicroPython-compatible tests under CPython
        run: python3 micropython/test_bit32vis.py